<!doctype html>
<html lang="bn">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>বাংলা সার্ভিস ডেস্ক</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <header>
        <h1>বাংলা সার্ভিস ডেস্ক</h1>
        <p class="sub">কথা বলুন বাংলায়, উত্তর শুনুন বাংলায়।</p>
      </header>

      <section class="controls">
        <button id="connectBtn" class="primary">সংযোগ করুন</button>
        <label class="mode">
          <input type="checkbox" id="vadToggle" checked />
          স্বয়ংক্রিয় শোনা (VAD)
        </label>
        <button id="talkBtn" class="ptt" disabled>চেপে ধরে কথা বলুন</button>
      </section>

      <details class="prompt-box" open>
        <summary>সিস্টেম প্রম্পট (System prompt)</summary>
        <textarea id="systemPrompt" rows="6" spellcheck="false"></textarea>
        <div class="prompt-actions">
          <button id="applyPromptBtn" class="secondary">প্রয়োগ করুন</button>
          <button id="resetPromptBtn" class="secondary">ডিফল্ট</button>
          <span id="promptStatus" class="prompt-status"></span>
        </div>
      </details>

      <p id="status" class="status">অপেক্ষমান…</p>

      <section id="log" class="log" aria-live="polite"></section>

      <audio id="remote" autoplay playsinline></audio>
    </main>

    <script src="app.js"></script>
  </body>
</html>

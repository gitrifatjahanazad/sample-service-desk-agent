<!doctype html>
<html lang="bn">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>বাংলা সার্ভিস ডেস্ক</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <header>
        <h1>বাংলা সার্ভিস ডেস্ক</h1>
        <p class="sub">কথা বলুন বাংলায়, উত্তর শুনুন বাংলায়।</p>
      </header>

      <section class="controls">
        <button id="connectBtn" class="primary">সংযোগ করুন</button>
        <label class="mode">
          <input type="checkbox" id="vadToggle" checked />
          স্বয়ংক্রিয় শোনা (VAD)
        </label>
        <button id="talkBtn" class="ptt" disabled>চেপে ধরে কথা বলুন</button>
      </section>

      <details class="prompt-box" open>
        <summary>সিস্টেম প্রম্পট (System prompt)</summary>
        <textarea id="systemPrompt" rows="6" spellcheck="false"></textarea>
        <div class="prompt-actions">
          <button id="applyPromptBtn" class="secondary">প্রয়োগ করুন</button>
          <button id="resetPromptBtn" class="secondary">ডিফল্ট</button>
          <button id="savePromptSipBtn" class="secondary">SIP-এ সেভ করুন</button>
          <span id="promptStatus" class="prompt-status"></span>
        </div>
      </details>

      <details class="prompt-box sip-box">
        <summary>📞 কল কনফিগ (SIP Account)</summary>
        <p id="sipStatus" class="sip-status">লোড হচ্ছে…</p>
        <form id="sipForm" class="sip-grid" autocomplete="off">
          <label>Account Name<input name="accountName" type="text" /></label>
          <label>SIP Server<input name="sipServer" type="text" placeholder="pabx.example.com:5060" /></label>
          <label>SIP Proxy<input name="sipProxy" type="text" /></label>
          <label>Username *<input name="username" type="text" required /></label>
          <label>Domain *<input name="domain" type="text" required /></label>
          <label>Login<input name="login" type="text" /></label>
          <label>Password *<input name="password" type="password" placeholder="(saved)" autocomplete="new-password" /></label>
          <label>Display Name<input name="displayName" type="text" /></label>
          <label>Voicemail Number<input name="voicemailNumber" type="text" /></label>
          <label>Dialing Prefix<input name="dialingPrefix" type="text" /></label>
          <label>Dial Plan<input name="dialPlan" type="text" /></label>
          <label>Hide Caller ID
            <select name="hideCallerId">
              <option value="Disabled">Disabled</option>
              <option value="Enabled">Enabled</option>
            </select>
          </label>
          <label>Media Encryption
            <select name="mediaEncryption">
              <option value="Disabled">Disabled</option>
              <option value="SRTP Optional">SRTP Optional</option>
              <option value="SRTP Mandatory">SRTP Mandatory</option>
            </select>
          </label>
          <label>Transport
            <select name="transport">
              <option value="UDP">UDP</option>
              <option value="TCP" disabled>TCP (not supported)</option>
              <option value="TLS" disabled>TLS (not supported)</option>
            </select>
          </label>
          <label>Public Address<input name="publicAddress" type="text" value="Auto" /></label>
          <label>Register Refresh<input name="registerRefresh" type="number" min="60" value="300" /></label>
          <label>Keep-Alive<input name="keepAlive" type="number" min="0" value="15" /></label>
          <label class="sip-check"><input type="checkbox" name="publishPresence" /> Publish Presence</label>
          <label class="sip-check"><input type="checkbox" name="allowIpRewrite" /> Allow IP Rewrite</label>
          <label class="sip-check"><input type="checkbox" name="ice" /> ICE</label>
          <label class="sip-check"><input type="checkbox" name="disableSessionTimers" /> Disable Session Timers</label>
        </form>
        <div class="prompt-actions">
          <button id="sipSaveBtn" class="primary">Save</button>
          <button id="sipStartBtn" class="secondary">Start</button>
          <button id="sipStopBtn" class="secondary">Stop</button>
          <span id="sipFormStatus" class="prompt-status"></span>
        </div>
        <div class="sip-log-box">
          <strong>কল লগ</strong>
          <ul id="sipLog" class="sip-log"></ul>
        </div>
      </details>

      <p id="status" class="status">অপেক্ষমান…</p>

      <section id="log" class="log" aria-live="polite"></section>

      <audio id="remote" autoplay playsinline></audio>
    </main>

    <script src="app.js"></script>
  </body>
</html>

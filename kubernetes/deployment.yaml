apiVersion: apps/v1
kind: Deployment
metadata:
  name: helpdesk-app
  namespace: clickspikes
  labels:
    app: helpdesk-app
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: helpdesk-app
  template:
    metadata:
      labels:
        app: helpdesk-app
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      initContainers:
        - name: seed-sip-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              if [ ! -f /data/sip-config.json ]; then
                cp /seed/sip-config.json /data/sip-config.json
                echo "seeded /data/sip-config.json from ConfigMap"
              else
                echo "/data/sip-config.json already present, skipping seed"
              fi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: sip-config-seed
              mountPath: /seed
              readOnly: true
      containers:
        - name: helpdesk-app
          image: us-central1-docker.pkg.dev/applied-abbey-356818/clickspikes/helpdesk:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
            - name: sip
              containerPort: 5070
              protocol: UDP
          env:
            - name: SIP_PUBLIC_ADDRESS
              value: "34.10.145.57"
          envFrom:
            - secretRef:
                name: helpdesk-app-secret
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /data
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: data
          emptyDir: {}
        - name: sip-config-seed
          configMap:
            name: helpdesk-sip-config-seed
      terminationGracePeriodSeconds: 30